<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Business — A Turn-Based Empire of Fronts &amp; Favors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13100d;
    --bg2:#1b1713;
    --card:#221d18;
    --card-hi:#2a241e;
    --line:#3a322a;
    --gold:#d4a94e;
    --gold-dim:#9c7c38;
    --cream:#efe6d5;
    --muted:#a89c89;
    --red:#c1453c;
    --red-hi:#e0584e;
    --green:#7da46a;
    --blue:#6d93b8;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, rgba(212,169,78,.06), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(193,69,60,.05), transparent 60%),
      var(--bg);
    color:var(--cream);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14px;
    line-height:1.45;
    min-height:100%;
  }
  h1,h2,h3,.serif{font-family:'Cinzel',serif;letter-spacing:.04em}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:disabled{opacity:.38;cursor:not-allowed}

  /* ===== top bar ===== */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:12px 20px;
    background:linear-gradient(180deg, rgba(19,16,13,.97), rgba(19,16,13,.92));
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(8px);
  }
  .brand{display:flex;flex-direction:column;min-width:170px}
  .brand h1{font-size:19px;font-weight:900;color:var(--gold);line-height:1.1;white-space:nowrap}
  .brand small{color:var(--muted);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
  .stat{display:flex;flex-direction:column;gap:3px;min-width:96px}
  .stat .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;transition:color .3s}
  .stat .val.flash-up{color:var(--green)}
  .stat .val.flash-down{color:var(--red-hi)}
  .stat .sub{font-size:10.5px;color:var(--muted)}
  .meter{width:130px;height:7px;border-radius:4px;background:#0d0b09;overflow:hidden;border:1px solid var(--line)}
  .meter>i{display:block;height:100%;border-radius:4px;transition:width .6s cubic-bezier(.22,1,.36,1), background .4s}
  .respect-fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
  .heat-fill{background:linear-gradient(90deg,#8a5a2c,var(--red),var(--red-hi))}
  .strikes{display:flex;gap:3px;margin-top:1px}
  .strike{width:9px;height:9px;border-radius:50%;border:1px solid var(--line);background:#0d0b09;transition:background .4s}
  .strike.on{background:var(--red-hi);box-shadow:0 0 7px rgba(224,88,78,.7)}
  .ap-pips{display:flex;gap:4px;margin-top:2px}
  .pip{width:11px;height:11px;border-radius:50%;border:1px solid var(--gold-dim);background:transparent;transition:background .3s, box-shadow .3s}
  .pip.on{background:var(--gold);box-shadow:0 0 6px rgba(212,169,78,.55)}
  .spacer{flex:1}
  .btn{
    padding:9px 16px;border-radius:9px;font-weight:600;font-size:13px;
    border:1px solid var(--line);background:var(--card);color:var(--cream);
    transition:transform .12s, background .2s, border-color .2s, box-shadow .2s;
  }
  .btn:hover:not(:disabled){background:var(--card-hi);border-color:var(--gold-dim);transform:translateY(-1px)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn.primary{
    background:linear-gradient(180deg,#e3b95e,#c2913a);color:#1d150a;border-color:#e3b95e;
    font-family:'Cinzel',serif;font-weight:700;letter-spacing:.06em;font-size:14px;padding:11px 22px;
    box-shadow:0 4px 16px rgba(212,169,78,.25);
  }
  .btn.primary:hover:not(:disabled){background:linear-gradient(180deg,#f0c869,#d4a141);transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,169,78,.4)}
  .btn.danger{border-color:#6e3631;color:var(--red-hi)}
  .btn.danger:hover:not(:disabled){border-color:var(--red);background:#2a1c19}
  .btn.small{padding:5px 10px;font-size:12px;border-radius:7px}
  .btn.ghost{border-color:transparent;color:var(--muted)}
  .btn.ghost:hover:not(:disabled){color:var(--cream);border-color:var(--line)}

  /* ===== layout ===== */
  .layout{display:grid;grid-template-columns:1fr 290px;gap:18px;padding:18px 20px;max-width:1440px;margin:0 auto}
  @media (max-width:980px){.layout{grid-template-columns:1fr}}

  /* ===== districts ===== */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tab{
    padding:8px 15px;border-radius:9px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);font-weight:600;font-size:12.5px;
    transition:all .2s;display:flex;align-items:center;gap:7px;
  }
  .tab:hover:not(:disabled){color:var(--cream);border-color:var(--gold-dim)}
  .tab.active{background:var(--card-hi);color:var(--gold);border-color:var(--gold-dim);box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .tab .own-count{font-size:10.5px;background:#0d0b09;border-radius:10px;padding:1px 7px;color:var(--gold)}
  .tab.locked{opacity:.45}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:13px}
  .pcard{
    position:relative;
    background:linear-gradient(180deg,var(--card),#1e1914);
    border:1px solid var(--line);border-radius:var(--r);
    padding:14px;display:flex;flex-direction:column;gap:9px;
    transition:transform .18s, box-shadow .18s, border-color .18s;
    animation:cardIn .35s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .pcard.mine{border-color:#5a4a2a}
  .pcard.mine:hover{border-color:var(--gold-dim)}
  .pcard.closed{filter:grayscale(.6)}
  .pcard .head{display:flex;align-items:flex-start;gap:9px}
  .pcard .icon{font-size:24px;line-height:1;filter:saturate(.8)}
  .pcard .nm{font-weight:700;font-size:13.5px;line-height:1.25}
  .pcard .typ{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .badge{
    margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .badge.you{background:rgba(212,169,78,.16);color:var(--gold);border:1px solid rgba(212,169,78,.35)}
  .badge.sale{background:rgba(168,156,137,.12);color:var(--muted);border:1px solid var(--line)}
  .badge.r0{background:rgba(193,69,60,.14);color:var(--red-hi);border:1px solid rgba(193,69,60,.4)}
  .badge.r1{background:rgba(109,147,184,.14);color:var(--blue);border:1px solid rgba(109,147,184,.4)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px}
  .row .k{color:var(--muted)}
  .row .v{font-weight:600;font-variant-numeric:tabular-nums}
  .v.gold{color:var(--gold)}
  .v.green{color:var(--green)}
  .condbar{flex:1;height:6px;border-radius:4px;background:#0d0b09;border:1px solid #2c261f;overflow:hidden;margin:0 8px}
  .condbar>i{display:block;height:100%;transition:width .5s cubic-bezier(.22,1,.36,1), background .4s}
  .lvl{display:flex;gap:3px}
  .lvl i{width:8px;height:8px;border-radius:2px;background:#0d0b09;border:1px solid var(--line)}
  .lvl i.on{background:var(--gold);border-color:var(--gold)}
  .squeeze{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .squeeze button{
    flex:1;padding:5px 0;font-size:10.5px;font-weight:600;letter-spacing:.04em;
    color:var(--muted);background:#1a1511;transition:all .18s;
  }
  .squeeze button+button{border-left:1px solid var(--line)}
  .squeeze button.on{color:#1d150a;background:var(--gold)}
  .squeeze button.on.hot{background:var(--red-hi);color:#fff}
  .pcard .acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
  .pcard .acts .btn{flex:1;min-width:62px;text-align:center}
  .closed-tag{
    position:absolute;inset:0;border-radius:var(--r);
    background:rgba(13,11,9,.72);display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-weight:700;color:var(--red-hi);letter-spacing:.12em;font-size:13px;
    flex-direction:column;gap:4px;text-align:center;padding:10px;
  }
  .closed-tag small{font-family:'Inter';color:var(--muted);letter-spacing:0;font-weight:500;font-size:11px}

  /* income float */
  .float-cash{
    position:absolute;top:8px;right:10px;font-weight:700;color:var(--green);font-size:13px;
    pointer-events:none;animation:floatUp 1.4s ease-out forwards;font-variant-numeric:tabular-nums;
  }
  @keyframes floatUp{0%{opacity:0;transform:translateY(6px)}15%{opacity:1}100%{opacity:0;transform:translateY(-22px)}}

  /* ===== side panel ===== */
  .panel{display:flex;flex-direction:column;gap:14px}
  .box{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:14px}
  .box h3{font-size:12px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;font-weight:700}
  .crewline{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;margin-bottom:8px}
  .crewline .k{color:var(--muted)}
  .ops{display:flex;flex-direction:column;gap:7px}
  .op{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--card);
    transition:all .18s;text-align:left;width:100%;
  }
  .op:hover:not(:disabled){border-color:var(--gold-dim);background:var(--card-hi)}
  .op .t{font-weight:600;font-size:12.5px}
  .op .d{font-size:10.5px;color:var(--muted)}
  .op .cost{font-size:11px;color:var(--gold);font-weight:600;white-space:nowrap}
  #log{display:flex;flex-direction:column-reverse;gap:6px;max-height:300px;overflow-y:auto;scrollbar-width:thin}
  #log p{font-size:11.5px;color:var(--muted);border-left:2px solid var(--line);padding:1px 0 1px 9px;animation:logIn .3s ease}
  #log p b{color:var(--cream)}
  #log p.good{border-color:var(--green)}
  #log p.bad{border-color:var(--red)}
  #log p.gold{border-color:var(--gold)}
  @keyframes logIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1}}

  /* ===== toasts ===== */
  #toasts{position:fixed;top:74px;right:18px;z-index:90;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{
    background:var(--card-hi);border:1px solid var(--line);border-left:3px solid var(--gold);
    padding:10px 14px;border-radius:9px;font-size:12.5px;max-width:300px;box-shadow:var(--shadow);
    animation:toastIn .3s cubic-bezier(.22,1,.36,1), toastOut .4s ease 3.4s forwards;
  }
  .toast.bad{border-left-color:var(--red-hi)}
  .toast.good{border-left-color:var(--green)}
  @keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  @keyframes toastOut{to{opacity:0;transform:translateX(24px)}}

  /* ===== modal ===== */
  #overlay{
    position:fixed;inset:0;z-index:100;background:rgba(10,8,6,.7);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  #overlay.show{display:flex;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:linear-gradient(180deg,#252019,#1a1511);
    border:1px solid var(--gold-dim);border-radius:16px;max-width:480px;width:100%;
    padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.7);
    animation:modalIn .35s cubic-bezier(.22,1,.36,1);
    max-height:88vh;overflow-y:auto;
  }
  @keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
  .modal .kicker{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .modal h2{color:var(--gold);font-size:21px;margin-bottom:12px;line-height:1.25}
  .modal .body{color:var(--cream);font-size:13.5px;margin-bottom:18px;white-space:pre-line}
  .modal .body .rep-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2c261f;font-size:13px}
  .modal .body .rep-row:last-child{border-bottom:none}
  .modal .body .rep-row b{font-variant-numeric:tabular-nums}
  .modal .choices{display:flex;flex-direction:column;gap:8px}
  .modal .choices .btn{width:100%;text-align:center;padding:11px}
  .tierflare{font-size:42px;text-align:center;margin-bottom:8px;animation:flare 1s ease}
  @keyframes flare{0%{transform:scale(.4) rotate(-8deg);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}

  .footer{max-width:1440px;margin:0 auto;padding:6px 20px 26px;color:#6b6052;font-size:11px;display:flex;gap:14px;align-items:center}
  .footer button{text-decoration:underline;color:#8a7d6a}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>FAMILY BUSINESS</h1>
    <small id="famName">The Coffeelock Family</small>
  </div>
  <div class="stat">
    <span class="lbl">Cash</span>
    <span class="val" id="cashVal">$0</span>
    <span class="sub" id="incomeVal">+$0 / week</span>
  </div>
  <div class="stat">
    <span class="lbl" id="tierLbl">Respect — Associate</span>
    <div class="meter"><i class="respect-fill" id="respectBar"></i></div>
    <span class="sub" id="respectVal">0 / 60</span>
  </div>
  <div class="stat">
    <span class="lbl">Heat</span>
    <div class="meter"><i class="heat-fill" id="heatBar"></i></div>
    <div class="strikes" id="strikes" title="Crackdown strikes — three and the Feds build a case"></div>
  </div>
  <div class="stat">
    <span class="lbl">Actions</span>
    <div class="ap-pips" id="apPips"></div>
    <span class="sub" id="weekVal">Week 1</span>
  </div>
  <div class="spacer"></div>
  <button class="btn primary" id="endTurnBtn">End Week ⏵</button>
</header>

<main class="layout">
  <section>
    <nav class="tabs" id="tabs"></nav>
    <div class="grid" id="grid"></div>
  </section>

  <aside class="panel">
    <div class="box">
      <h3>The Crew</h3>
      <div class="crewline"><span class="k">Capos on payroll</span><b id="capoCount">0</b></div>
      <div class="crewline"><span class="k">Weekly wages</span><b id="wageVal">$0</b></div>
      <div class="ops">
        <button class="op" id="hireBtn">
          <span><span class="t">Hire a Capo</span><br><span class="d">+1 action every week</span></span>
          <span class="cost" id="hireCost">$400</span>
        </button>
      </div>
    </div>
    <div class="box">
      <h3>Operations</h3>
      <div class="ops">
        <button class="op" id="jobBtn">
          <span><span class="t">🎲 Run a Job</span><br><span class="d" id="jobDesc">Risky score. Pays cash &amp; respect, draws heat.</span></span>
          <span class="cost">1 AP</span>
        </button>
        <button class="op" id="layLowBtn">
          <span><span class="t">🌒 Lay Low</span><br><span class="d">Quiet week. Heat −15.</span></span>
          <span class="cost">1 AP</span>
        </button>
        <button class="op" id="bribeBtn">
          <span><span class="t">💼 Bribe City Hall</span><br><span class="d">Heat −30. Once a week, price follows the heat.</span></span>
          <span class="cost" id="bribeCost">$500</span>
        </button>
      </div>
    </div>
    <div class="box">
      <h3>The Word on the Street</h3>
      <div id="log"></div>
    </div>
  </aside>
</main>

<div class="footer">
  <span>Family Business — a turn-based property racket.</span>
  <button id="newGameBtn">Start a new family</button>
  <button id="helpBtn">How to play</button>
</div>

<div id="toasts"></div>
<div id="overlay"><div class="modal" id="modal"></div></div>

<script>
"use strict";

/* ============================================================
   DATA
============================================================ */
const TIERS = [
  {name:"Associate",   need:0,    capos:1, perk:""},
  {name:"Made Man",    need:60,   capos:2, perk:"Old Town opens its doors. You can keep 2 capos."},
  {name:"Caporegime",  need:180,  capos:3, perk:"Market Row is yours to work. 3 capos. Heat cools faster."},
  {name:"Underboss",   need:400,  capos:4, perk:"The Neon Strip lights up. 4 capos. Jobs pay half again more."},
  {name:"Boss",        need:750,  capos:5, perk:"Crown Heights takes your calls. 5 capos. Property sellers knock 10% off for you."},
  {name:"Don of the City", need:1200, capos:6, perk:"The whole city kisses the ring."},
];

const DISTRICTS = [
  {name:"Little Harbor", tier:0, icon:"⚓"},
  {name:"Old Town",      tier:1, icon:"🏛️"},
  {name:"Market Row",    tier:2, icon:"🏪"},
  {name:"Neon Strip",    tier:3, icon:"🎰"},
  {name:"Crown Heights", tier:4, icon:"🏙️"},
];

const PROPS = [
  // [district, icon, name, type, price, income]
  [0,"🪙","Rusty Anchor Pawn","Pawn shop",900,70],
  [0,"🍳","Dockside Diner","Diner",1200,95],
  [0,"🧺","Harbor Laundromat","Laundromat",1500,115],
  [0,"🍺","Fisherman's Tavern","Tavern",2000,150],
  [0,"📦","Pier 9 Warehouse","Warehouse",2600,190],
  [1,"💈","Crosstown Barber","Barbershop",2200,160],
  [1,"🥩","Benedetti's Butcher","Butcher shop",3000,215],
  [1,"🍝","Trattoria Lucia","Restaurant",2800,200],
  [1,"🎱","Eight-Ball Hall","Pool hall",3400,240],
  [1,"🏨","The Old Town Arms","Hotel",4500,310],
  [2,"💎","Marlowe Jewelers","Jewelry store",5200,350],
  [2,"🚢","Continental Imports","Import office",6000,400],
  [2,"🔧","Redline Auto Garage","Garage",5600,380],
  [2,"🪩","Club Velvet","Nightclub",7500,500],
  [2,"🗳️","Dockworkers' Union","Union office",8200,540],
  [3,"🍸","The Gilded Lily","Cocktail lounge",9500,620],
  [3,"🥊","Iron Bell Gym","Boxing gym",8800,580],
  [3,"🎭","Moulin Noir","Theater",11000,720],
  [3,"🎰","The Grand Pharaoh","Casino",14000,900],
  [3,"🛎️","Hotel Mirage","Hotel",16000,1000],
  [4,"⚖️","Hartley & Cross LLP","Law firm",18000,1100],
  [4,"⛳","Crown Country Club","Country club",24000,1450],
  [4,"🏦","Meridian Private Bank","Bank",26000,1550],
  [4,"🏢","The Pinnacle Tower","Penthouses",32000,1900],
  [4,"🏛️","City Hall Annex","Civic lobby",40000,2400],
];

const RIVALS = [
  {id:0, name:"The Moretti Family", short:"Moretti", cls:"r0"},
  {id:1, name:"The Volkov Bratva",  short:"Volkov",  cls:"r1"},
];

const SQUEEZE = [
  {label:"Clean",  mult:1.0,  heat:0,   decay:0},
  {label:"Firm",   mult:1.45, heat:1,   decay:2},
  {label:"Brutal", mult:2.0,  heat:2.5, decay:4},
];
const LVL_MULT = [1, 1.5, 2.1];

const SAVE_KEY = "familyBusiness.v1";

/* ============================================================
   STATE
============================================================ */
let S = null;

function newState(){
  return {
    week:1, cash:2500, respect:0, tier:0, heat:0, strikes:0,
    capos:0, ap:2, apMax:2,
    jobUsed:false, bribeUsed:false,
    boomWeeks:0, retaliation:-1, debtWeeks:0,
    curDistrict:0,
    props: PROPS.map((p,i)=>({
      id:i, d:p[0], icon:p[1], name:p[2], type:p[3],
      price:p[4], income:p[5],
      owner:"market", cond:100, level:1, squeeze:0, closed:0,
    })),
    log:[],
    seenIntro:false, won:false, over:false,
  };
}

function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw){ S = JSON.parse(raw); return true; }
  }catch(e){}
  return false;
}

/* ============================================================
   HELPERS
============================================================ */
const $ = id => document.getElementById(id);
const fmt = n => "$" + Math.round(n).toLocaleString("en-US");
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const rnd = (a,b)=>a+Math.random()*(b-a);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

function marketPrice(p){
  let m = p.price * (1 + 0.012*(S.week-1));
  if(S.tier>=4) m *= 0.9;
  return Math.round(m);
}
function propValue(p){ // what it's worth in your hands
  return Math.round(p.price * (1 + 0.012*(S.week-1)) * LVL_MULT[p.level-1] * (0.55 + 0.45*p.cond/100));
}
function propIncome(p){
  if(p.closed>0) return 0;
  let inc = p.income * LVL_MULT[p.level-1] * (0.3 + 0.7*p.cond/100) * SQUEEZE[p.squeeze].mult;
  if(S.boomWeeks>0) inc *= 1.3;
  return Math.round(inc);
}
function totalIncome(){ return S.props.filter(p=>p.owner==="you").reduce((s,p)=>s+propIncome(p),0); }
function wages(){ return S.capos * 180; }
function repairCost(p){ return Math.round((100-p.cond)/100 * p.price * 0.35); }
function upgradeCost(p){ return Math.round(p.price * 0.8 * p.level); }
function hireCost(){ return 400 + S.capos*250; }
function bribeCost(){ return Math.round(300 + S.heat*12 + S.tier*200); }
function owned(){ return S.props.filter(p=>p.owner==="you"); }
function jobPayBase(){ return Math.round((350 + S.tier*450) * (S.tier>=3?1.5:1)); }

function addRespect(n){
  S.respect += n;
  checkTier();
}
function addHeat(n){
  S.heat = clamp(S.heat + n, 0, 100);
}
function log(msg, cls){
  S.log.push({msg, cls:cls||"", w:S.week});
  if(S.log.length>60) S.log.shift();
  renderLog();
}
function toast(msg, cls){
  const t = document.createElement("div");
  t.className = "toast " + (cls||"");
  t.innerHTML = msg;
  $("toasts").appendChild(t);
  setTimeout(()=>t.remove(), 4000);
}

/* animated cash counter */
let shownCash = 0;
function animateCash(){
  const el = $("cashVal");
  const target = S.cash;
  if(shownCash === target){ el.textContent = fmt(target); return; }
  el.classList.remove("flash-up","flash-down");
  void el.offsetWidth;
  el.classList.add(target>shownCash ? "flash-up" : "flash-down");
  const start = shownCash, t0 = performance.now(), dur = 600;
  function step(t){
    const k = Math.min(1,(t-t0)/dur), e = 1-Math.pow(1-k,3);
    el.textContent = fmt(start + (target-start)*e);
    if(k<1) requestAnimationFrame(step);
    else { shownCash = target; setTimeout(()=>el.classList.remove("flash-up","flash-down"), 500); }
  }
  requestAnimationFrame(step);
}

/* ============================================================
   MODALS (queued)
============================================================ */
const modalQueue = [];
let modalOpen = false;

function showModal(cfg){
  modalQueue.push(cfg);
  if(!modalOpen) nextModal();
}
function nextModal(){
  const cfg = modalQueue.shift();
  if(!cfg){ modalOpen=false; $("overlay").classList.remove("show"); return; }
  modalOpen = true;
  const m = $("modal");
  m.innerHTML = "";
  if(cfg.flare){ const f=document.createElement("div"); f.className="tierflare"; f.textContent=cfg.flare; m.appendChild(f); }
  if(cfg.kicker){ const k=document.createElement("div"); k.className="kicker"; k.textContent=cfg.kicker; m.appendChild(k); }
  const h=document.createElement("h2"); h.textContent=cfg.title; m.appendChild(h);
  const b=document.createElement("div"); b.className="body"; b.innerHTML=cfg.body||""; m.appendChild(b);
  const ch=document.createElement("div"); ch.className="choices";
  (cfg.choices||[{label:"Understood"}]).forEach(c=>{
    const btn=document.createElement("button");
    btn.className="btn" + (c.primary?" primary":"") + (c.danger?" danger":"");
    btn.innerHTML=c.label;
    if(c.disabled) btn.disabled = true;
    btn.onclick=()=>{ if(c.fn) c.fn(); renderAll(); save(); nextModal(); };
    ch.appendChild(btn);
  });
  m.appendChild(ch);
  $("overlay").classList.add("show");
}

/* ============================================================
   PLAYER ACTIONS
============================================================ */
function spendAP(){
  if(S.ap<=0){ toast("No actions left this week. End the week or hire more capos.","bad"); return false; }
  S.ap--; return true;
}
function needCash(n){
  if(S.cash<n){ toast("Not enough cash — you need "+fmt(n)+".","bad"); return false; }
  return true;
}

function buyProp(id){
  const p=S.props[id]; if(p.owner!=="market"||S.over) return;
  const price=marketPrice(p);
  if(!needCash(price)) return;
  if(!spendAP()) return;
  S.cash-=price; p.owner="you"; p.cond=clamp(p.cond,60,100);
  const rep = 4 + p.d*3;
  addRespect(rep);
  log("Bought <b>"+p.name+"</b> for "+fmt(price)+".","gold");
  toast("🏠 "+p.name+" is now family property. +"+rep+" respect","good");
  afterAction();
}

function repairProp(id){
  const p=S.props[id]; if(p.owner!=="you"||S.over) return;
  const cost=repairCost(p);
  if(!needCash(cost)) return;
  if(!spendAP()) return;
  S.cash-=cost; p.cond=100;
  log("Fixed up <b>"+p.name+"</b> for "+fmt(cost)+".");
  afterAction();
}

function upgradeProp(id){
  const p=S.props[id]; if(p.owner!=="you"||p.level>=3||S.over) return;
  const cost=upgradeCost(p);
  if(!needCash(cost)) return;
  if(!spendAP()) return;
  S.cash-=cost; p.level++;
  addRespect(3);
  log("Renovated <b>"+p.name+"</b> to level "+p.level+".","gold");
  toast("✨ "+p.name+" upgraded — income up. +3 respect","good");
  afterAction();
}

function sellProp(id){
  const p=S.props[id]; if(p.owner!=="you"||S.over) return;
  const price=Math.round(propValue(p)*0.7);
  showModal({
    kicker:"Liquidation", title:"Sell "+p.name+"?",
    body:"A quick sale brings <b>"+fmt(price)+"</b> (70% of its worth). Walking away from a front costs you <b>3 respect</b>.",
    choices:[
      {label:"Sell it — "+fmt(price), danger:true, fn:()=>{
        S.cash+=price; p.owner="market"; p.squeeze=0; p.level=1; p.closed=0;
        S.respect=Math.max(0,S.respect-3);
        log("Sold <b>"+p.name+"</b> for "+fmt(price)+".","bad");
      }},
      {label:"Keep it", primary:true},
    ],
  });
}

function setSqueeze(id, lvl){
  const p=S.props[id]; if(p.owner!=="you"||S.over) return;
  p.squeeze=lvl;
  renderAll(); save();
}

function buyoutProp(id){
  const p=S.props[id]; if(typeof p.owner!=="number"||S.over) return;
  const r=RIVALS[p.owner];
  const price=Math.round(marketPrice(p)*1.5);
  if(!needCash(price)) return;
  if(!spendAP()) return;
  S.cash-=price; p.owner="you"; p.squeeze=0;
  addRespect(8);
  log("Bought out the "+r.short+"s at <b>"+p.name+"</b> for "+fmt(price)+".","gold");
  toast("🤝 Clean buyout of "+p.name+". +8 respect","good");
  afterAction();
}

function muscleProp(id){
  const p=S.props[id]; if(typeof p.owner!=="number"||S.over) return;
  const r=RIVALS[p.owner];
  const price=Math.round(marketPrice(p)*0.85);
  if(!needCash(price)) return;
  if(!spendAP()) return;
  S.cash-=price; const prevOwner=p.owner; p.owner="you"; p.squeeze=0; p.cond=clamp(p.cond-15,10,100);
  addRespect(14); addHeat(14);
  log("Muscled the "+r.short+"s out of <b>"+p.name+"</b>.","gold");
  toast("🔫 "+p.name+" taken by force. +14 respect, +14 heat","bad");
  if(Math.random()<0.35) S.retaliation = prevOwner;
  afterAction();
}

function hireCapo(){
  if(S.over) return;
  const max = TIERS[S.tier].capos;
  if(S.capos>=max){ toast("Your rank only commands "+max+" capo"+(max>1?"s":"")+". Earn more respect.","bad"); return; }
  const cost=hireCost();
  if(!needCash(cost)) return;
  S.cash-=cost; S.capos++;
  S.apMax = 2 + S.capos; S.ap++; // new capo works this week too
  log("A new capo kissed the ring. Wages now "+fmt(wages())+"/week.");
  toast("🤵 Capo hired — +1 action every week.","good");
  afterAction();
}

function runJob(){
  if(S.over) return;
  if(S.jobUsed){ toast("The crew already ran a job this week.","bad"); return; }
  if(!spendAP()) return;
  S.jobUsed=true;
  const chance = clamp(0.9 - S.heat/250, 0.35, 0.9);
  const pay = Math.round(jobPayBase()*rnd(0.8,1.25));
  if(Math.random()<chance){
    S.cash+=pay; addHeat(6); addRespect(6+S.tier*2);
    log("The job came off clean: <b>+"+fmt(pay)+"</b>.","good");
    toast("🎲 Job done. +"+fmt(pay)+", +"+(6+S.tier*2)+" respect, +6 heat","good");
  } else {
    addHeat(15); addRespect(2);
    log("The job went sideways — the crew scattered. <b>+15 heat</b>.","bad");
    toast("🚨 Job blown. No score, +15 heat.","bad");
  }
  afterAction();
}

function layLow(){
  if(S.over) return;
  if(!spendAP()) return;
  addHeat(-15);
  log("The family kept its head down. Heat −15.");
  toast("🌒 Heat −15.","good");
  afterAction();
}

function bribe(){
  if(S.over) return;
  if(S.bribeUsed){ toast("City Hall's bagman only comes once a week.","bad"); return; }
  const cost=bribeCost();
  if(!needCash(cost)) return;
  S.cash-=cost; S.bribeUsed=true; addHeat(-30);
  log("An envelope changed hands at City Hall. Heat −30.");
  toast("💼 Bribe paid. Heat −30.","good");
  afterAction();
}

function afterAction(){ renderAll(); save(); }

/* ============================================================
   TIERS
============================================================ */
function checkTier(){
  while(S.tier<TIERS.length-1 && S.respect>=TIERS[S.tier+1].need){
    S.tier++;
    const t=TIERS[S.tier];
    S.apMax = 2 + S.capos;
    log("The family rises: you are now <b>"+t.name+"</b>.","gold");
    if(S.tier===TIERS.length-1 && !S.won){
      S.won=true;
      showModal({
        flare:"👑", kicker:"Victory", title:"Don of the City",
        body:"Week "+S.week+". Every district pays tribute, every door opens before you knock. The city is yours.\n\nYou built it from "+fmt(2500)+" and a pawn shop on the docks. Keep playing if you like — empires still need running.",
        choices:[{label:"The city is mine", primary:true}],
      });
    } else {
      showModal({
        flare:"🥃", kicker:"Promotion", title:"You are now "+t.name,
        body:t.perk,
        choices:[{label:"Salute", primary:true}],
      });
    }
  }
}

/* ============================================================
   RIVALS
============================================================ */
function rivalTurn(report){
  if(S.week<3) return;
  RIVALS.forEach(r=>{
    const chance = clamp(0.35 + S.week*0.006, 0, 0.7);
    if(Math.random()>chance) return;
    // rivals shop in districts up to one above your tier
    const maxD = Math.min(4, S.tier+1);
    const targets = S.props.filter(p=>p.owner==="market" && p.d<=maxD);
    if(!targets.length) return;
    // prefer cheaper properties, slight randomness
    targets.sort((a,b)=>marketPrice(a)-marketPrice(b));
    const t = targets[Math.floor(Math.random()*Math.min(3,targets.length))];
    t.owner = r.id;
    report.push("🕴️ The <b>"+r.short+"s</b> took over "+t.name+" in "+DISTRICTS[t.d].name+".");
    log("The "+r.short+"s claimed <b>"+t.name+"</b>.","bad");
  });
  // retaliation for muscling
  if(S.retaliation>=0){
    const r=RIVALS[S.retaliation]; S.retaliation=-1;
    const mine=owned();
    if(mine.length){
      const t=pick(mine);
      t.cond=clamp(t.cond-30,5,100);
      report.push("🔥 The <b>"+r.short+"s</b> hit back — thugs wrecked "+t.name+" (condition −30).");
      log("The "+r.short+"s trashed <b>"+t.name+"</b> in retaliation.","bad");
    }
  }
}

/* ============================================================
   EVENTS
============================================================ */
function pickEvent(){
  const mine=owned();
  const pool=[];
  const add=(w,fn)=>{ if(w>0) pool.push({w,fn}); };

  add(10, ()=>{ // lucky find
    const amt=Math.round(rnd(150,400)*(1+S.tier*0.5));
    S.cash+=amt;
    return {kicker:"Street Event", title:"A Debt Repaid", body:"An old gambling debt finally lands on your desk, with interest.\n\n<b>+"+fmt(amt)+"</b>"};
  });
  add(mine.length?12:0, ()=>{ // fire
    const t=pick(mine); t.cond=clamp(t.cond-35,5,100);
    return {kicker:"Street Event", title:"Fire at "+t.name, body:"Bad wiring — or so the fire marshal wrote down. Either way, half the place is ash.\n\n<b>"+t.name+": condition −35</b>"};
  });
  add(8, ()=>{ // boom
    S.boomWeeks=2;
    return {kicker:"Street Event", title:"Money Flows Downtown", body:"A convention crowd hits the city flush with cash.\n\n<b>All income +30% for the next 2 weeks.</b>"};
  });
  add(mine.length?10:0, ()=>{ // cold snap
    mine.forEach(p=>p.cond=clamp(p.cond-8,5,100));
    return {kicker:"Street Event", title:"A Brutal Winter Week", body:"Burst pipes and cracked windows across every property you hold.\n\n<b>All your properties: condition −8</b>"};
  });
  add(12, ()=>{ // cop shakedown — choice
    const ask=Math.round(350+S.tier*250);
    return {kicker:"Decision", title:"A Detective Comes Calling",
      body:"Detective Marsh slides into the booth across from you. “Nice little operation. Be a shame if I got curious.” He wants <b>"+fmt(ask)+"</b>.",
      choices:[
        {label:"Pay him off — "+fmt(ask), fn:()=>{ if(S.cash>=ask){S.cash-=ask; log("Paid off Detective Marsh.");} else {addHeat(12); log("Couldn't cover Marsh's price. +12 heat","bad");} }},
        {label:"Throw him out (+12 heat)", danger:true, fn:()=>{ addHeat(12); addRespect(4); log("Sent Detective Marsh packing. +4 respect, +12 heat"); }},
      ]};
  });
  add(8, ()=>{ // informant — choice
    return {kicker:"Decision", title:"A Rat in the Walls",
      body:"One of your runners has been talking to the Feds. Your consigliere can make it a misunderstanding — for <b>$600</b> in lawyers and favors. Or you handle it the old way.",
      choices:[
        {label:"Lawyers and favors — $600", fn:()=>{ if(S.cash>=600){S.cash-=600; log("The rat recanted. Expensive, but quiet.");} else {addHeat(10); log("No cash for lawyers — the rat talked. +10 heat","bad");} }},
        {label:"The old way (+10 heat, +8 respect)", danger:true, fn:()=>{ addHeat(10); addRespect(8); log("The rat won't be talking. The street took notice.","gold"); }},
      ]};
  });
  add(8, ()=>{ // old friend — choice
    return {kicker:"Decision", title:"An Old Friend Needs Help",
      body:"Sal from the neighborhood is behind with the Morettis. <b>$500</b> squares him away — and the neighborhood remembers who helped.",
      choices:[
        {label:"Cover him — $500, +8 respect", fn:()=>{ if(S.cash>=500){S.cash-=500; addRespect(8); log("Squared Sal's debt. The neighborhood remembers.","gold");} else { log("You couldn't cover Sal. Word gets around.","bad"); S.respect=Math.max(0,S.respect-2);} }},
        {label:"Not your problem", fn:()=>{ S.respect=Math.max(0,S.respect-2); log("Sal's on his own. −2 respect"); }},
      ]};
  });
  add(S.heat>55 && mine.length ? 16 : 0, ()=>{ // raid
    const t=pick(mine); t.closed=2;
    const fine=Math.round(200+S.heat*8);
    S.cash-=fine;
    return {kicker:"Police", title:"Raid on "+t.name,
      body:"Squad cars at the curb, tape on the doors. With heat this high, they didn't need much of an excuse.\n\n<b>"+t.name+" closed for 2 weeks. Fine: "+fmt(fine)+"</b>"};
  });
  add(mine.some(p=>p.squeeze===2)?10:0, ()=>{ // squeeze backlash
    const t=pick(mine.filter(p=>p.squeeze===2));
    t.cond=clamp(t.cond-20,5,100);
    return {kicker:"Street Event", title:"Backlash at "+t.name,
      body:"You squeeze a place hard enough, somebody throws a brick. The shopkeeper's nephew did more than that.\n\n<b>"+t.name+": condition −20</b>"};
  });

  if(!pool.length) return null;
  const total=pool.reduce((s,e)=>s+e.w,0);
  let roll=Math.random()*total;
  for(const e of pool){ roll-=e.w; if(roll<=0) return e.fn; }
  return pool[pool.length-1].fn;
}

/* ============================================================
   END TURN
============================================================ */
function endTurn(){
  if(S.over || modalOpen) return;
  const report=[];

  // 1) income
  let income=0;
  owned().forEach(p=>{
    const inc=propIncome(p);
    income+=inc;
    if(inc>0) floatCash(p.id, inc);
  });
  const w=wages();
  S.cash += income - w;
  if(income>0) report.push("💰 Rent and rackets brought in <b>"+fmt(income)+"</b>.");
  if(w>0) report.push("🤵 Crew wages: <b>−"+fmt(w)+"</b>.");
  if(income===0 && owned().length===0) report.push("You hold no property yet. Buy a front — that's where the money lives.");

  // 2) decay & closures
  owned().forEach(p=>{
    p.cond=clamp(p.cond-(2+SQUEEZE[p.squeeze].decay+rnd(0,2)),0,100);
    if(p.closed>0) p.closed--;
  });

  // 3) heat from squeezing + cooling
  let squeezeHeat=0;
  owned().forEach(p=>squeezeHeat+=SQUEEZE[p.squeeze].heat);
  const cool = 3 + (S.tier>=2?4:0);
  addHeat(squeezeHeat-cool);
  if(squeezeHeat>0) report.push("🔥 Squeezed businesses drew <b>+"+Math.round(squeezeHeat)+" heat</b> (cooled −"+cool+").");

  // 4) rivals
  rivalTurn(report);

  // 5) boom decay
  if(S.boomWeeks>0) S.boomWeeks--;

  // 6) crackdown check
  if(S.heat>=100){
    S.strikes++;
    const seize=Math.round(Math.max(0,S.cash)*0.25);
    S.cash-=seize;
    const mine=owned().sort((a,b)=>propIncome(b)-propIncome(a));
    let closedName="";
    if(mine.length){ mine[0].closed=3; closedName=mine[0].name; }
    S.heat=55;
    report.push("🚔 <b>CRACKDOWN.</b> The city came down hard: "+fmt(seize)+" seized"+(closedName?", "+closedName+" shuttered for 3 weeks":"")+". Strike "+S.strikes+" of 3.");
    log("Crackdown! Strike "+S.strikes+" of 3.","bad");
    if(S.strikes>=3){ gameOver("rico"); return; }
  }

  // 7) debt spiral
  if(S.cash<0){
    S.cash=Math.round(S.cash*1.12);
    report.push("🦈 You're into the loan sharks for <b>"+fmt(-S.cash)+"</b> (12% weekly juice). Sell something or earn, fast.");
    if(S.cash<-5000){ gameOver("debt"); return; }
  }

  // 8) advance
  S.week++;
  S.ap=S.apMax;
  S.jobUsed=false; S.bribeUsed=false;

  // 9) event (after report)
  const evFn = Math.random()<0.55 ? pickEvent() : null;

  renderAll(); save();

  showModal({
    kicker:"Week "+(S.week-1)+" closes", title:"The Weekly Take",
    body:"<div>"+report.map(r=>"<div class='rep-row'><span>"+r+"</span></div>").join("")+"</div>",
    choices:[{label:"On to week "+S.week, primary:true}],
  });
  if(evFn){
    const ev=evFn();
    if(ev) showModal({kicker:ev.kicker,title:ev.title,body:ev.body,choices:ev.choices||[{label:"So it goes",primary:true}]});
  }
}

function floatCash(propId, amt){
  const card=document.querySelector('[data-prop="'+propId+'"]');
  if(!card) return;
  const f=document.createElement("div");
  f.className="float-cash"; f.textContent="+"+fmt(amt);
  card.appendChild(f);
  setTimeout(()=>f.remove(),1500);
}

function gameOver(kind){
  S.over=true;
  renderAll(); save();
  const stats="\n\nYou lasted <b>"+S.week+" weeks</b>, reached the rank of <b>"+TIERS[S.tier].name+"</b>, and held <b>"+owned().length+" properties</b>.";
  const cfg = kind==="rico"
    ? {flare:"⚖️", kicker:"Game Over", title:"The RICO Case Lands",
       body:"Three strikes was all the federal prosecutor needed. The vans arrive at dawn; the papers run your photo above the fold."+stats}
    : {flare:"🦈", kicker:"Game Over", title:"The Sharks Collect",
       body:"Five grand in the hole and nothing left to sell. There are debts in this city you don't walk away from."+stats};
  cfg.choices=[{label:"Start a new family", primary:true, fn:()=>startNewGame(true)}];
  showModal(cfg);
}

/* ============================================================
   RENDER
============================================================ */
function condColor(c){ return c>65 ? "var(--green)" : c>35 ? "var(--gold)" : "var(--red-hi)"; }

function renderTop(){
  animateCash();
  const inc=totalIncome()-wages();
  $("incomeVal").textContent=(inc>=0?"+":"−")+fmt(Math.abs(inc)).slice(0)+" / week";
  $("incomeVal").style.color = inc>=0 ? "var(--green)" : "var(--red-hi)";

  const t=TIERS[S.tier], next=TIERS[S.tier+1];
  $("tierLbl").textContent="Respect — "+t.name;
  if(next){
    const lo=t.need, hi=next.need;
    $("respectBar").style.width = clamp((S.respect-lo)/(hi-lo)*100,0,100)+"%";
    $("respectVal").textContent=S.respect+" / "+hi;
  } else {
    $("respectBar").style.width="100%";
    $("respectVal").textContent=S.respect+" — Don of the City";
  }

  $("heatBar").style.width=S.heat+"%";
  const sEl=$("strikes"); sEl.innerHTML="";
  for(let i=0;i<3;i++){ const d=document.createElement("i"); d.className="strike"+(i<S.strikes?" on":""); sEl.appendChild(d); }

  const ap=$("apPips"); ap.innerHTML="";
  for(let i=0;i<S.apMax;i++){ const d=document.createElement("i"); d.className="pip"+(i<S.ap?" on":""); ap.appendChild(d); }
  $("weekVal").textContent="Week "+S.week;
  $("endTurnBtn").disabled=S.over;
}

function renderTabs(){
  const el=$("tabs"); el.innerHTML="";
  DISTRICTS.forEach((d,i)=>{
    const locked = S.tier<d.tier;
    const b=document.createElement("button");
    b.className="tab"+(i===S.curDistrict?" active":"")+(locked?" locked":"");
    const cnt=S.props.filter(p=>p.d===i&&p.owner==="you").length;
    b.innerHTML=d.icon+" "+d.name+(locked?" 🔒":(cnt?" <span class='own-count'>"+cnt+"</span>":""));
    b.title=locked?"Unlocks at rank: "+TIERS[d.tier].name:"";
    b.onclick=()=>{ if(locked){toast("🔒 "+d.name+" opens when you become <b>"+TIERS[d.tier].name+"</b>.","bad");return;} S.curDistrict=i; renderAll(); };
    el.appendChild(b);
  });
}

function renderGrid(){
  const el=$("grid"); el.innerHTML="";
  const d=S.curDistrict;
  S.props.filter(p=>p.d===d).forEach((p,idx)=>{
    const card=document.createElement("div");
    card.className="pcard"+(p.owner==="you"?" mine":"")+(p.closed>0?" closed":"");
    card.dataset.prop=p.id;
    card.style.animationDelay=(idx*0.04)+"s";

    let badge, body="";
    if(p.owner==="you") badge="<span class='badge you'>Yours</span>";
    else if(p.owner==="market") badge="<span class='badge sale'>For sale</span>";
    else badge="<span class='badge "+RIVALS[p.owner].cls+"'>"+RIVALS[p.owner].short+"</span>";

    const head="<div class='head'><span class='icon'>"+p.icon+"</span><div><div class='nm'>"+p.name+"</div><div class='typ'>"+p.type+"</div></div>"+badge+"</div>";

    if(p.owner==="market"){
      const price=marketPrice(p);
      body =
        "<div class='row'><span class='k'>Asking price</span><span class='v gold'>"+fmt(price)+"</span></div>"+
        "<div class='row'><span class='k'>Base take</span><span class='v'>"+fmt(p.income)+"/wk</span></div>"+
        "<div class='acts'><button class='btn small' onclick='buyProp("+p.id+")' "+(S.cash<price||S.ap<=0?"disabled":"")+">Buy · 1 AP</button></div>";
    } else if(p.owner==="you"){
      const inc=propIncome(p);
      const sq=SQUEEZE.map((s,i)=>"<button class='"+(p.squeeze===i?("on"+(i===2?" hot":"")):"")+"' onclick='setSqueeze("+p.id+","+i+")'>"+s.label+"</button>").join("");
      const rc=repairCost(p), uc=upgradeCost(p);
      body =
        "<div class='row'><span class='k'>Take</span><span class='v green'>+"+fmt(inc)+"/wk</span></div>"+
        "<div class='row'><span class='k'>Cond.</span><div class='condbar'><i style='width:"+p.cond+"%;background:"+condColor(p.cond)+"'></i></div><span class='v'>"+Math.round(p.cond)+"%</span></div>"+
        "<div class='row'><span class='k'>Level</span><span class='lvl'>"+[1,2,3].map(l=>"<i class='"+(p.level>=l?"on":"")+"'></i>").join("")+"</span></div>"+
        "<div class='squeeze'>"+sq+"</div>"+
        "<div class='acts'>"+
          "<button class='btn small' onclick='repairProp("+p.id+")' "+(p.cond>=99||S.cash<rc||S.ap<=0?"disabled":"")+" title='Restore to 100%'>Repair "+fmt(rc)+"</button>"+
          (p.level<3?"<button class='btn small' onclick='upgradeProp("+p.id+")' "+(S.cash<uc||S.ap<=0?"disabled":"")+" title='+50% income'>Upgrade "+fmt(uc)+"</button>":"")+
          "<button class='btn small ghost' onclick='sellProp("+p.id+")'>Sell</button>"+
        "</div>";
      if(p.closed>0) body+="<div class='closed-tag'>CLOSED BY POLICE<small>Reopens in "+p.closed+" week"+(p.closed>1?"s":"")+"</small></div>";
    } else {
      const bo=Math.round(marketPrice(p)*1.5), mu=Math.round(marketPrice(p)*0.85);
      body =
        "<div class='row'><span class='k'>Their take</span><span class='v'>~"+fmt(p.income)+"/wk</span></div>"+
        "<div class='acts'>"+
          "<button class='btn small' onclick='buyoutProp("+p.id+")' "+(S.cash<bo||S.ap<=0?"disabled":"")+" title='Pay a premium, stay clean. +8 respect'>Buyout "+fmt(bo)+"</button>"+
          "<button class='btn small danger' onclick='muscleProp("+p.id+")' "+(S.cash<mu||S.ap<=0?"disabled":"")+" title='Cheaper, but +14 heat and they may hit back. +14 respect'>Muscle "+fmt(mu)+"</button>"+
        "</div>";
    }
    card.innerHTML=head+body;
    el.appendChild(card);
  });
}

function renderPanel(){
  $("capoCount").textContent=S.capos+" / "+TIERS[S.tier].capos;
  $("wageVal").textContent=fmt(wages());
  $("hireCost").textContent=fmt(hireCost());
  $("hireBtn").disabled=S.over||S.capos>=TIERS[S.tier].capos||S.cash<hireCost();
  $("jobBtn").disabled=S.over||S.jobUsed||S.ap<=0;
  $("jobDesc").textContent=S.jobUsed?"Done for the week — the crew is lying low.":"Risky score, ~"+fmt(jobPayBase())+". Heat hurts the odds.";
  $("layLowBtn").disabled=S.over||S.ap<=0;
  $("bribeBtn").disabled=S.over||S.bribeUsed||S.cash<bribeCost();
  $("bribeCost").textContent=fmt(bribeCost());
}

function renderLog(){
  const el=$("log"); el.innerHTML="";
  S.log.slice(-40).forEach(l=>{
    const p=document.createElement("p");
    p.className=l.cls;
    p.innerHTML="<b>W"+l.w+"</b> · "+l.msg;
    el.appendChild(p);
  });
}

function renderAll(){
  renderTop(); renderTabs(); renderGrid(); renderPanel(); renderLog();
}

/* ============================================================
   INTRO / NEW GAME
============================================================ */
function showIntro(){
  showModal({
    flare:"🚬", kicker:"Welcome to the family", title:"You Run This Family Now",
    body:"The old Don is gone, and what's left is <b>$2,500</b>, two good hands a week, and a city that doesn't know your name yet.\n\n" +
      "<b>The loop:</b> spend your actions buying fronts, fixing them up, and squeezing them for income — then end the week to collect.\n\n" +
      "<b>The climb:</b> deals and jobs earn <b>respect</b>. Rank up to unlock new districts and a bigger crew — more capos means more actions every week.\n\n" +
      "<b>The catch:</b> squeezing hard draws <b>heat</b>. Hit 100 and the city cracks down — three crackdowns is a RICO case. Properties decay, rivals are buying up the map, and the loan sharks are always watching.\n\n" +
      "Start on the docks. Buy cheap, collect, climb.",
    choices:[{label:"Va bene. Let's work.", primary:true, fn:()=>{S.seenIntro=true;}}],
  });
}

function startNewGame(skipConfirm){
  const go=()=>{ S=newState(); shownCash=S.cash; save(); renderAll(); showIntro(); };
  if(skipConfirm){ go(); return; }
  showModal({
    kicker:"New game", title:"Walk away from this family?",
    body:"Your current empire will be erased. There's no coming back.",
    choices:[
      {label:"Burn it down — start over", danger:true, fn:go},
      {label:"Stay", primary:true},
    ],
  });
}

/* ============================================================
   BOOT
============================================================ */
$("endTurnBtn").onclick=endTurn;
$("hireBtn").onclick=hireCapo;
$("jobBtn").onclick=runJob;
$("layLowBtn").onclick=layLow;
$("bribeBtn").onclick=bribe;
$("newGameBtn").onclick=()=>startNewGame(false);
$("helpBtn").onclick=showIntro;
document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !modalOpen) endTurn();
  if(e.key==="Enter" && modalOpen){
    const first=$("modal").querySelector(".choices .btn.primary")||$("modal").querySelector(".choices .btn");
    if(first && !first.disabled) first.click();
  }
});

if(!load()) S=newState();
shownCash=S.cash;
renderAll();
if(!S.seenIntro) showIntro();
else if(S.over) startNewGame(true);
</script>
</body>
</html>
